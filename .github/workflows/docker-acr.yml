name: Docker Build and Push to ACR

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to push instead of latest; leave empty to use latest'
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY: sudorouter.azurecr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Get current date
        id: date
        run: echo "DATE=$(TZ='Asia/Shanghai' date +'%Y_%m%d_%H%M')" >>$GITHUB_OUTPUT

      - name: Resolve image tag
        id: image_tag
        env:
          INPUT_IMAGE_TAG: ${{ github.event.inputs.image_tag }}
        run: |
          if [ -n "$INPUT_IMAGE_TAG" ]; then
            tag="$INPUT_IMAGE_TAG"
          else
            tag="latest"
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/new-api:${{ steps.image_tag.outputs.tag }}
            ${{ env.REGISTRY }}/new-api:${{ steps.date.outputs.DATE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
